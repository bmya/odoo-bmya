name: Deploy to Servers

on:
  push:
    branches:
      - '15.0'
      - '16.0'
      - '17.0'
      - '18.0'
      - '19.0'

  pull_request:
    types: [closed]
    branches:
      - '15.0'
      - '16.0'
      - '17.0'
      - '18.0'
      - '19.0'

  workflow_dispatch:
    inputs:
      target_branch:
        description: 'Rama/versión a desplegar'
        required: true
        type: choice
        options:
          - '15.0'
          - '16.0'
          - '17.0'
          - '18.0'
          - '19.0'

env:
  WEBHOOK_URL: ${{ secrets.TELEGRAM_WEBHOOK_URL }}
  ANSIBLE_HOST_KEY_CHECKING: 'False'

jobs:
  deploy:
    name: Deploy to Odoo Servers
    runs-on: self-hosted

    if: |
      github.event_name == 'push' ||
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'pull_request' && github.event.pull_request.merged == true)

    steps:
      - name: Determine Odoo version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.target_branch }}"
          else
            VERSION="${GITHUB_REF#refs/heads/}"
          fi
          echo "odoo_version=$VERSION" >> $GITHUB_OUTPUT

          case "$VERSION" in
            15.0) echo "ansible_group=odoo_15" >> $GITHUB_OUTPUT ;;
            16.0) echo "ansible_group=odoo_16" >> $GITHUB_OUTPUT ;;
            17.0) echo "ansible_group=odoo_17" >> $GITHUB_OUTPUT ;;
            18.0) echo "ansible_group=odoo_18" >> $GITHUB_OUTPUT ;;
            19.0) echo "ansible_group=odoo_19" >> $GITHUB_OUTPUT ;;
            *) echo "ansible_group=odoo_servers" >> $GITHUB_OUTPUT ;;
          esac

      - name: Send start notification
        run: |
          COMMIT_MSG=$(echo '${{ github.event.head_commit.message }}' | head -1 | cut -c1-50)
          COMMIT_AUTHOR="${{ github.event.head_commit.author.name }}"

          # Si no hay head_commit (ej: workflow_dispatch), usar datos del actor
          if [ -z "$COMMIT_MSG" ]; then
            COMMIT_MSG="Deploy manual"
            COMMIT_AUTHOR="${{ github.actor }}"
          fi

          REPO_NAME=$(echo "${{ github.repository }}" | cut -d'/' -f2)

          curl -s -X POST "$WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d '{
              "level": "info",
              "title": "🔄 Deploy Iniciado: '"$REPO_NAME"'",
              "message": "Versión: ${{ steps.version.outputs.odoo_version }}\nCommit: '"${GITHUB_SHA:0:7}"'\nMensaje: '"$COMMIT_MSG"'\nAutor: '"$COMMIT_AUTHOR"'",
              "server": "GitHub Actions",
              "timestamp": "'$(date -u +%Y-%m-%dT%H:%M:%SZ)'"
            }' || true

      - name: Run Ansible playbook
        id: ansible
        env:
          GH_USER: ${{ secrets.GH_USER }}
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          cd /opt/bmya-infrastructure/ansible

          # Extraer nombre del repo (sin el owner)
          REPO_NAME=$(echo "${{ github.repository }}" | cut -d'/' -f2)

          # Obtener lista de servidores objetivo ANTES de ejecutar
          TARGET_SERVERS=$(ansible -i inventory/infrastructure-vlan.yml ${{ steps.version.outputs.ansible_group }} --list-hosts 2>/dev/null | tail -n +2 | tr -d ' ' | sort | tr '\n' ',' | sed 's/,$//' || echo "")
          TARGET_COUNT=$(echo "$TARGET_SERVERS" | tr ',' '\n' | grep -v '^$' | wc -l | tr -d ' ')

          # Limpiar logs anteriores
          rm -f /tmp/ansible-output.log /tmp/ansible-stderr.log

          # Ejecutar actualización con output completo
          set +e  # No salir en error, capturar exit code
          ansible-playbook -i inventory/infrastructure-vlan.yml playbooks/update-odoo-modules.yml \
            --limit ${{ steps.version.outputs.ansible_group }} \
            -e "repo_name=$REPO_NAME" \
            -e "odoo_version=${{ steps.version.outputs.odoo_version }}" \
            -e "github_user=$GH_USER" \
            -e "github_token=$GH_TOKEN" \
            > /tmp/ansible-output.log 2> /tmp/ansible-stderr.log

          ANSIBLE_EXIT_CODE=$?
          set -e

          # Capturar servidores EXITOSOS (ok o changed en summary)
          SUCCESS_SERVERS=$(grep -E "^(ok|changed):" /tmp/ansible-output.log | awk '{print $2}' | sort -u | tr '\n' ',' | sed 's/,$//' || echo "")

          # Capturar servidores con cambios
          CHANGED_SERVERS=$(grep -E "changed=[1-9]" /tmp/ansible-output.log | grep -oP '^\w+' | sort -u | tr '\n' ',' | sed 's/,$//' || echo "")

          # Capturar servidores FALLIDOS (failed)
          FAILED_SERVERS=$(grep -E "^failed:" /tmp/ansible-output.log | awk '{print $2}' | sort -u | tr '\n' ' ' || echo "")

          # Capturar servidores UNREACHABLE
          UNREACHABLE_SERVERS=$(grep -E "^unreachable:" /tmp/ansible-output.log | awk '{print $2}' | sort -u | tr '\n' ' ' || echo "")

          # Capturar servidores SKIPPED (si aplica)
          SKIPPED_SERVERS=$(grep -E "^skipping:" /tmp/ansible-output.log | awk '{print $2}' | sort -u | tr '\n' ' ' || echo "")

          # Consolidar TODOS los servidores con problemas
          NOT_UPDATED=""
          for server in $FAILED_SERVERS; do
            NOT_UPDATED="${NOT_UPDATED}${server}(failed) "
          done
          for server in $UNREACHABLE_SERVERS; do
            NOT_UPDATED="${NOT_UPDATED}${server}(unreachable) "
          done
          for server in $SKIPPED_SERVERS; do
            NOT_UPDATED="${NOT_UPDATED}${server}(skipped) "
          done

          # Limpiar espacios extra y convertir a lista separada por comas
          NOT_UPDATED=$(echo "$NOT_UPDATED" | sed 's/ *$//' | tr ' ' ',' || echo "")

          # Contar servidores NO actualizados
          if [ -n "$NOT_UPDATED" ]; then
            NOT_UPDATED_COUNT=$(echo "$NOT_UPDATED" | tr ',' '\n' | grep -v '^$' | wc -l | tr -d ' ')
          else
            NOT_UPDATED_COUNT=0
          fi

          # Contar cambios
          CHANGED_COUNT=$(grep -E "changed=[1-9]" /tmp/ansible-output.log | wc -l | tr -d ' ' || echo "0")
          SUCCESS_COUNT=$(echo "$SUCCESS_SERVERS" | tr ',' '\n' | grep -v '^$' | wc -l | tr -d ' ')

          # Capturar errores si los hay
          if [ -s /tmp/ansible-stderr.log ]; then
            ERROR_MSG=$(head -5 /tmp/ansible-stderr.log | tr '\n' ' ' | cut -c1-200)
          else
            ERROR_MSG=""
          fi

          echo "exit_code=$ANSIBLE_EXIT_CODE" >> $GITHUB_OUTPUT
          echo "target_servers=$TARGET_SERVERS" >> $GITHUB_OUTPUT
          echo "target_count=$TARGET_COUNT" >> $GITHUB_OUTPUT
          echo "success_servers=$SUCCESS_SERVERS" >> $GITHUB_OUTPUT
          echo "success_count=$SUCCESS_COUNT" >> $GITHUB_OUTPUT
          echo "changed_servers=$CHANGED_SERVERS" >> $GITHUB_OUTPUT
          echo "changed_count=$CHANGED_COUNT" >> $GITHUB_OUTPUT
          echo "not_updated=$NOT_UPDATED" >> $GITHUB_OUTPUT
          echo "not_updated_count=$NOT_UPDATED_COUNT" >> $GITHUB_OUTPUT
          echo "error_msg=$ERROR_MSG" >> $GITHUB_OUTPUT

          # Si Ansible falló, salir con error
          if [ $ANSIBLE_EXIT_CODE -ne 0 ]; then
            echo "Ansible failed with exit code $ANSIBLE_EXIT_CODE"
            cat /tmp/ansible-stderr.log
            exit $ANSIBLE_EXIT_CODE
          fi

      - name: Send success notification
        if: success()
        run: |
          COMMIT_MSG=$(echo '${{ github.event.head_commit.message }}' | head -1 | cut -c1-50)
          COMMIT_AUTHOR="${{ github.event.head_commit.author.name }}"

          if [ -z "$COMMIT_MSG" ]; then
            COMMIT_MSG="Deploy manual"
            COMMIT_AUTHOR="${{ github.actor }}"
          fi

          # Construir mensaje de estado
          STATUS_MSG="✅ Exitosos: ${{ steps.ansible.outputs.success_count }}/${{ steps.ansible.outputs.target_count }}"

          if [ "${{ steps.ansible.outputs.changed_count }}" -gt 0 ]; then
            STATUS_MSG="${STATUS_MSG}\n📦 Con cambios: ${{ steps.ansible.outputs.changed_count }}"
          fi

          # Si hay servidores NO actualizados, reportarlos CLARAMENTE
          if [ "${{ steps.ansible.outputs.not_updated_count }}" -gt 0 ]; then
            LEVEL="warning"
            STATUS_MSG="${STATUS_MSG}\n⚠️ NO ACTUALIZADOS: ${{ steps.ansible.outputs.not_updated_count }}\n└─ ${{ steps.ansible.outputs.not_updated }}"
          elif [ "${{ steps.ansible.outputs.changed_count }}" -gt 0 ]; then
            LEVEL="success"
          else
            LEVEL="info"
            STATUS_MSG="${STATUS_MSG}\n(Sin cambios - ya actualizado)"
          fi

          REPO_NAME=$(echo "${{ github.repository }}" | cut -d'/' -f2)

          curl -s -X POST "$WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d '{
              "level": "'$LEVEL'",
              "title": "✅ Deploy Completado: '"$REPO_NAME"'",
              "message": "Versión: ${{ steps.version.outputs.odoo_version }}\n'"$STATUS_MSG"'\n\nCommit: '"${GITHUB_SHA:0:7}"'\nAutor: '"$COMMIT_AUTHOR"'",
              "server": "GitHub Actions",
              "timestamp": "'$(date -u +%Y-%m-%dT%H:%M:%SZ)'"
            }' || true

      - name: Send failure notification
        if: failure()
        run: |
          COMMIT_MSG=$(echo '${{ github.event.head_commit.message }}' | head -1 | cut -c1-50)
          COMMIT_AUTHOR="${{ github.event.head_commit.author.name }}"

          if [ -z "$COMMIT_MSG" ]; then
            COMMIT_MSG="Deploy manual"
            COMMIT_AUTHOR="${{ github.actor }}"
          fi

          # Construir mensaje detallado de fallo
          FAIL_MSG="🚨 Objetivo: ${{ steps.ansible.outputs.target_count }} servidores"

          # Mostrar exitosos si los hubo
          if [ "${{ steps.ansible.outputs.success_count }}" -gt 0 ]; then
            FAIL_MSG="${FAIL_MSG}\n✅ Exitosos: ${{ steps.ansible.outputs.success_count }}"
          fi

          # Mostrar servidores NO actualizados con detalles
          if [ -n "${{ steps.ansible.outputs.not_updated }}" ]; then
            FAIL_MSG="${FAIL_MSG}\n\n❌ NO ACTUALIZADOS (${{ steps.ansible.outputs.not_updated_count }}):\n${{ steps.ansible.outputs.not_updated }}"
          else
            FAIL_MSG="${FAIL_MSG}\n\n❌ Error en workflow (no en servidores)"
          fi

          # Agregar error de stderr si existe
          if [ -n "${{ steps.ansible.outputs.error_msg }}" ]; then
            FAIL_MSG="${FAIL_MSG}\n\n⚠️ Error:\n${{ steps.ansible.outputs.error_msg }}"
          fi

          REPO_NAME=$(echo "${{ github.repository }}" | cut -d'/' -f2)

          curl -s -X POST "$WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d '{
              "level": "critical",
              "title": "🚨 Deploy Fallido: '"$REPO_NAME"'",
              "message": "Versión: ${{ steps.version.outputs.odoo_version }}\n'"$FAIL_MSG"'\n\nCommit: '"${GITHUB_SHA:0:7}"'\nAutor: '"$COMMIT_AUTHOR"'\n\nLogs: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}",
              "server": "GitHub Actions",
              "timestamp": "'$(date -u +%Y-%m-%dT%H:%M:%SZ)'"
            }' || true

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ansible-logs-${{ github.run_id }}
          path: |
            /tmp/ansible-output.log
            /tmp/ansible-stderr.log
          retention-days: 7
